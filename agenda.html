<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Rodamos.cl — Mi agenda</title>
    <link rel="stylesheet" href="./assets/styles.css" />
  </head>
  <body>
    <header class="topbar">
      <div class="container topbar__inner">
        <div class="brand">
          <div class="brand__logo">RODAMOS</div>
          <div class="brand__sub">Calendario de eventos de ciclismo</div>
        </div>
        <nav class="nav">
          <a class="nav__link" href="./index.html">Calendario</a>
          <a class="nav__link" href="./submit.html">Publica eventos</a>
          <a class="nav__link nav__link--active" href="./agenda.html">Mi agenda</a>
        </nav>
      </div>
    </header>

    <main class="container">
      <div class="layout">
        <section class="card">
          <div class="card__header">
            <div>
              <div class="card__title">Mi agenda</div>
              <div class="card__hint">Se guarda en este navegador (no requiere cuenta).</div>
            </div>
          </div>
          <div class="card__body">
            <div id="agenda-status" class="alert" style="display:none"></div>
            <div id="agenda"></div>
            <div style="margin-top:12px;">
              <button id="btn-clear" class="btn btn--ghost" type="button">Vaciar agenda</button>
            </div>
          </div>
        </section>

        <aside class="aside">
          <div class="ad">
            <div>
              <div class="ad__title">Publicidad</div>
              <div class="ad__hint">Espacio reservado para banner vertical.</div>
              <div class="ad__box">300 × 600</div>
            </div>
          </div>
        </aside>
      </div>
    </main>

    <footer class="footer container">
      <div>© <span id="year"></span> Rodamos.cl</div>
    </footer>

    <script src="./assets/config.js"></script>
    <script src="./assets/app.js"></script>
    <script>
      window.RODAMOS_PAGE = "agenda";
      document.getElementById("year").textContent = new Date().getFullYear();
      window.RodamosApp && window.RodamosApp.renderAgendaPage();
    </script>
  </body>
</html>
